<!DOCTYPE html>
<html>

<head>

<title>Radar de Ofertas</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
margin:0;
text-align:center;
}

header{
background:#ffcc00;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:white;
width:240px;
margin:15px;
padding:15px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.oferta{
background:red;
color:white;
padding:4px 10px;
border-radius:6px;
font-size:12px;
display:inline-block;
margin-bottom:10px;
}

.preco{
color:#00a650;
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

button{
background:#00a650;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
width:100%;
font-weight:bold;
}

button:hover{
background:#008f44;
}

</style>

</head>

<body>

<header>
📡 RADAR DE OFERTAS
</header>

<h2>🔥 Ofertas do Dia</h2>

<div class="container" id="produtos"></div>

<script>

const produtos = [

{
nome:"Celular Samsung Galaxy A07 128GB 4GB RAM",
preco:"599",
foto:"https://http2.mlstatic.com/D_NQ_NP_2X_845912-MLA72645632120_112023-F.webp",
link:"https://meli.la/13DE3qb"
}

];

const container = document.getElementById("produtos");

produtos.forEach(produto => {

container.innerHTML += `

<div class="card">

<div class="oferta">OFERTA DO DIA</div>

<img src="${produto.foto}">

<h3>${produto.nome}</h3>

<div class="preco">R$ ${produto.preco}</div>

<a href="${produto.link}" target="_blank">

<button>🛒 Comprar no Mercado Livre</button>

</a>

</div>

`;

});

</script>

</body>

</html>
