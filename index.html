<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radar de Ofertas | Promoções do Mercado Livre</title>

<meta name="description" content="Radar de ofertas com promoções atualizadas do Mercado Livre. Celulares, eletrônicos, games, casa, beleza e muito mais.">

<meta name="keywords" content="ofertas mercado livre, promoções do dia, radar de ofertas, eletrônicos baratos">

<meta name="robots" content="index, follow">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f3f3f3;
}

header{
background:#ffc400;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.banner{
background:linear-gradient(90deg,#ff9900,#ffcc00);
text-align:center;
padding:25px;
font-size:22px;
font-weight:bold;
color:white;
}

.menu{
background:white;
padding:15px;
text-align:center;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

.menu a{
margin:0 12px;
text-decoration:none;
font-weight:bold;
color:#333;
}

.busca{
text-align:center;
padding:20px;
}

.busca input{
width:60%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.relampago{
background:#ff3b3b;
color:white;
text-align:center;
padding:10px;
font-weight:bold;
margin-bottom:20px;
}

.timer{
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

.nome{
font-size:14px;
margin:10px 0;
min-height:50px;
}

.preco{
color:#00a650;
font-size:22px;
font-weight:bold;
}

.botao{
display:inline-block;
background:#00a650;
color:white;
padding:10px 15px;
border-radius:6px;
text-decoration:none;
margin-top:10px;
}

footer{
text-align:center;
padding:40px;
color:#666;
}

</style>

</head>

<body>

<header>
📡 RADAR DE OFERTAS
</header>

<div class="banner">
🔥 OFERTAS DO DIA NO MERCADO LIVRE
</div>

<div class="menu">
<a href="#">Eletrônicos</a>
<a href="#">Games</a>
<a href="#">Casa</a>
<a href="#">Beleza</a>
<a href="#">Suplementos</a>
</div>

<div class="busca">
<input id="busca" placeholder="Buscar produtos..." onkeyup="buscarProduto()">
</div>

<div class="container">

<div class="relampago">
⚡ OFERTA RELÂMPAGO termina em
<span id="timer" class="timer"></span>
</div>

<div class="grid" id="produtos"></div>

</div>

<footer>
Radar de Ofertas © 2026
</footer>

<script src="./produtos.js"></script>

<script>

function buscarProduto(){

let input=document.getElementById("busca").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(function(card){

if(card.innerText.toLowerCase().includes(input)){

card.style.display="block"

}else{

card.style.display="none"

}

})

}

function contador(){

let tempo=3600

setInterval(function(){

tempo--

let minutos=Math.floor(tempo/60)

let segundos=tempo%60

document.getElementById("timer").innerHTML=minutos+"m "+segundos+"s"

},1000)

}

contador()

const grid=document.getElementById("produtos")

produtos.forEach(function(p){

const card=document.createElement("div")

card.className="card"

card.innerHTML=

'<img src="'+p.foto+'">'+
'<div class="nome">'+p.nome+'</div>'+
'<div class="preco">'+p.preco+'</div>'+
'<a class="botao" href="'+p.link+'" target="_blank">Comprar</a>'

grid.appendChild(card)

})

</script>

</body>
</html>
