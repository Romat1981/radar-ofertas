<!DOCTYPE html>
<html>

<head>

<title>Radar de Ofertas</title>

<style>

body{
font-family: Arial;
background:#f3f3f3;
margin:0;
text-align:center;
}

header{
background:#ffc400;
padding:20px;
font-size:28px;
font-weight:bold;
}

h2{
margin-top:30px;
}

.container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:30px;
}

.produto{
background:white;
padding:20px;
border-radius:10px;
width:260px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.tag{
background:red;
color:white;
padding:5px 10px;
border-radius:5px;
font-size:12px;
display:inline-block;
margin-bottom:10px;
}

.produto img{
width:100%;
border-radius:8px;
}

.produto h3{
font-size:18px;
margin:10px 0;
}

.preco{
color:#0a9a48;
font-size:22px;
font-weight:bold;
}

.botao{
background:#16a34a;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

.botao:hover{
background:#0d7a34;
}

</style>

</head>

<body>

<header>
📡 RADAR DE OFERTAS
</header>

<h2>🔥 Ofertas do Dia</h2>

<div class="container">

<div class="produto">

<span class="tag">OFERTA DO DIA</span>

<img src="https://http2.mlstatic.com/D_NQ_NP_2X_972233-MLA72587523210_112023-F.jpg">

<h3>Celular Samsung Galaxy A07 128GB 4GB RAM</h3>

<p class="preco">R$ 599</p>

<a href="https://meli.la/13DE3qb" target="_blank">
<button class="botao">🛒 Comprar no Mercado Livre</button>
</a>

</div>

</div>

</body>
</html>
