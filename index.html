<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radar de Ofertas</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

header{
background:#ffc400;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.menu{
background:white;
padding:10px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.menu a{
margin:0 10px;
text-decoration:none;
font-weight:bold;
color:#333;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.admin{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

.admin input{
width:100%;
padding:8px;
margin:5px 0;
}

.admin button{
background:#ffc400;
border:none;
padding:10px;
cursor:pointer;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.nome{
font-size:14px;
margin:10px 0;
}

.preco{
color:#00a650;
font-size:18px;
font-weight:bold;
}

.botao{
display:inline-block;
background:#00a650;
color:white;
padding:8px 12px;
border-radius:5px;
text-decoration:none;
margin-top:10px;
}

@media(max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<header>
📡 RADAR DE OFERTAS
</header>

<div class="menu">
<a href="#">Eletrônicos</a>
<a href="#">Games</a>
<a href="#">Casa</a>
<a href="#">Beleza</a>
<a href="#">Suplementos</a>
</div>

<div class="container">

<div class="admin">

<h3>Adicionar Produto</h3>

<input id="nome" placeholder="Nome do produto">

<input id="preco" placeholder="Preço">

<input id="foto" placeholder="Link da imagem">

<input id="link" placeholder="Link Mercado Livre">

<button onclick="addProduto()">Adicionar</button>

</div>

<div class="grid" id="grid"></div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

function salvar(){

localStorage.setItem("produtos", JSON.stringify(produtos));

}

function addProduto(){

let nome=document.getElementById("nome").value;
let preco=document.getElementById("preco").value;
let foto=document.getElementById("foto").value;
let link=document.getElementById("link").value;

produtos.push({nome,preco,foto,link});

salvar();

document.getElementById("nome").value="";
document.getElementById("preco").value="";
document.getElementById("foto").value="";
document.getElementById("link").value="";

mostrar();

}

function mostrar(){

let grid=document.getElementById("grid");

grid.innerHTML="";

produtos.forEach(function(p){

let card=document.createElement("div");

card.className="card";

card.innerHTML=
'<img src="'+p.foto+'">'+
'<div class="nome">'+p.nome+'</div>'+
'<div class="preco">'+p.preco+'</div>'+
'<a class="botao" href="'+p.link+'" target="_blank">Comprar</a>';

grid.appendChild(card);

});

}

mostrar();

</script>

</body>

</html>
