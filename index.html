<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radar de Ofertas | Promoções Mercado Livre</title>

<meta name="description" content="Radar de ofertas com promoções do Mercado Livre. Celulares, TVs, games, casa e beleza com descontos atualizados todos os dias.">

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

header{
background:#ffc400;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.banner{
background:linear-gradient(90deg,#ff9900,#ffcc00);
text-align:center;
padding:25px;
font-size:24px;
font-weight:bold;
color:white;
}

.menu{
background:white;
padding:15px;
text-align:center;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

.menu button{
margin:5px;
padding:10px 15px;
border:none;
background:#eee;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

.busca{
text-align:center;
padding:20px;
}

.busca input{
width:60%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.container{
max-width:1500px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
position:relative;
}

.card img{
width:100%;
border-radius:8px;
}

.nome{
font-size:14px;
margin:10px 0;
min-height:40px;
}

.preco{
color:#00a650;
font-size:20px;
font-weight:bold;
}

.botao{
display:inline-block;
background:#00a650;
color:white;
padding:10px 15px;
border-radius:6px;
text-decoration:none;
margin-top:10px;
}

.selo{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:5px 8px;
font-size:12px;
border-radius:4px;
}

.relampago{
background:#ff3b3b;
color:white;
text-align:center;
padding:10px;
font-weight:bold;
margin-bottom:20px;
}

footer{
text-align:center;
padding:40px;
color:#666;
}

</style>

</head>

<body>

<header>
📡 RADAR DE OFERTAS
</header>

<div class="banner">
🔥 OFERTAS DO DIA NO MERCADO LIVRE
</div>

<div class="menu">

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('eletronicos')">Eletrônicos</button>
<button onclick="filtrar('games')">Games</button>
<button onclick="filtrar('casa')">Casa</button>
<button onclick="filtrar('beleza')">Beleza</button>
<button onclick="filtrar('suplementos')">Suplementos</button>

</div>

<div class="busca">

<input id="busca" onkeyup="buscar()" placeholder="Buscar produtos...">

</div>

<div class="container">

<div class="relampago">
⚡ OFERTA RELÂMPAGO
</div>

<div class="grid" id="produtos"></div>

</div>

<footer>

Radar de Ofertas © 2026  
Promoções atualizadas diariamente.

</footer>

<script>

/* LISTA DE PRODUTOS */

const produtos = [

{
nome:"iPhone 14 Pro Max",
preco:"R$ 5.339",
img:"https://http2.mlstatic.com/D_NQ_NP_2X_896507-MLA96123118445_102025-F.webp",
link:"https://meli.la/2a6ue9k",
categoria:"eletronicos"
},

{
nome:"Playstation 5 Slim",
preco:"R$ 3.822",
img:"https://http2.mlstatic.com/D_NQ_NP_2X_945456-MLA99456386724_112025-F.webp",
link:"https://meli.la/2FcoRG5",
categoria:"games"
},

{
nome:"Air Fryer Mondial 4L",
preco:"R$ 269",
img:"https://http2.mlstatic.com/D_NQ_NP_2X_775407-MLA99776749612_122025-F.webp",
link:"https://meli.la/19LrGhn",
categoria:"casa"
},

{
nome:"Smart TV Samsung 32",
preco:"R$ 949",
img:"https://http2.mlstatic.com/D_NQ_NP_2X_959706-MLA99950013507_112025-F.webp",
link:"https://meli.la/1YM957K",
categoria:"eletronicos"
},

{
nome:"Creatina Growth 250g",
preco:"R$ 39,90",
img:"https://http2.mlstatic.com/D_NQ_NP_2X_662415-MLA97812910758_112025-F.webp",
link:"https://meli.la/2fvRduS",
categoria:"suplementos"
},

{
nome:"Body Splash Masculino",
preco:"R$ 86,90",
img:"https://http2.mlstatic.com/D_NQ_NP_2X_847667-MLA97122485144_112025-F.webp",
link:"https://meli.la/2Yr5NNa",
categoria:"beleza"
}

]

/* GERAR PRODUTOS */

function carregar(lista){

const container = document.getElementById("produtos")

container.innerHTML=""

lista.forEach(p=>{

container.innerHTML += `
<div class="card ${p.categoria}">
<div class="selo">OFERTA</div>
<img src="${p.img}">
<div class="nome">${p.nome}</div>
<div class="preco">${p.preco}</div>
<a class="botao" href="${p.link}" target="_blank">Comprar</a>
</div>
`

})

}

carregar(produtos)

/* BUSCA */

function buscar(){

let termo = document.getElementById("busca").value.toLowerCase()

let filtrado = produtos.filter(p =>
p.nome.toLowerCase().includes(termo)
)

carregar(filtrado)

}

/* FILTRO */

function filtrar(cat){

if(cat=="todos"){
carregar(produtos)
return
}

let filtrado = produtos.filter(p =>
p.categoria==cat
)

carregar(filtrado)

}

</script>

</body>
</html>
