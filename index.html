<style>

body{
font-family:Arial, Helvetica;
margin:0;
background:#ebebeb;
}

header{
background:#ffe600;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.menu{
background:white;
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

.menu a{
margin:0 10px;
text-decoration:none;
color:#333;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);

}

.card{
background:white;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.nome{
font-size:14px;
margin:10px 0;
height:40px;
overflow:hidden;
}

.preco{
font-size:22px;
font-weight:bold;
color:#00a650;
margin-bottom:10px;
}

.botao{
display:block;
background:#3483fa;
color:white;
padding:8px;
border-radius:4px;
text-decoration:none;
}

footer{
text-align:center;
padding:30px;
color:#666;
}

@media(max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>
