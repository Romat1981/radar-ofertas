<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radar de Ofertas | Promoções Mercado Livre</title>

<meta name="description" content="Radar de ofertas com promoções atualizadas do Mercado Livre">

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

header{
background:#ffc400;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.banner{
background:#ff9900;
text-align:center;
padding:20px;
color:white;
font-size:22px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
}

.preco{
color:#00a650;
font-size:22px;
font-weight:bold;
}

.botao{
display:inline-block;
background:#00a650;
color:white;
padding:10px 15px;
border-radius:6px;
text-decoration:none;
margin-top:10px;
}

.admin{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
background:#ffc400;
padding:10px;
border:none;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<header>
📡 RADAR DE OFERTAS
</header>

<div class="banner">
🔥 Ofertas do Dia no Mercado Livre
</div>

<div class="container">

<div class="admin">

<h3>Adicionar Produto</h3>

<input id="nome" placeholder="Nome do produto">

<input id="preco" placeholder="Preço">

<input id="foto" placeholder="Link da imagem">

<input id="link" placeholder="Link do Mercado Livre">

<button onclick="adicionarProduto()">Adicionar Produto</button>

</div>

<div class="grid" id="produtos"></div>

</div>

<script>

let produtos=JSON.parse(localStorage.getItem("produtos"))||[]

function salvar(){

localStorage.setItem("produtos",JSON.stringify(produtos))

}

function adicionarProduto(){

let nome=document.getElementById("nome").value

let preco=document.getElementById("preco").value

let foto=document.getElementById("foto").value

let link=document.getElementById("link").value

produtos.push({nome,preco,foto,link})

salvar()

mostrar()

}

function mostrar(){

let grid=document.getElementById("produtos")

grid.innerHTML=""

produtos.forEach(function(p){

let card=document.createElement("div")

card.className="card"

card.innerHTML=

'<img src="'+p.foto+'">'+
'<h4>'+p.nome+'</h4>'+
'<div class="preco">'+p.preco+'</div>'+
'<a class="botao" href="'+p.link+'" target="_blank">Comprar</a>'

grid.appendChild(card)

})

}

mostrar()

</script>

</body>
</html>
