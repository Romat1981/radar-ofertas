<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radar de Ofertas</title>

<style>

body{
font-family:Arial;
margin:0;
background:#ebebeb;
}

header{
background:#ffe600;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.menu{
background:white;
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

.menu a{
margin:0 10px;
text-decoration:none;
color:#333;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.admin{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

.admin input{
width:100%;
padding:8px;
margin:5px 0;
border:1px solid #ccc;
border-radius:4px;
}

.admin button{
background:#3483fa;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:4px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.nome{
font-size:14px;
height:40px;
overflow:hidden;
}

.preco{
color:#00a650;
font-size:20px;
font-weight:bold;
margin:5px 0;
}

.botao{
display:block;
background:#3483fa;
color:white;
padding:8px;
border-radius:4px;
text-decoration:none;
margin-top:5px;
}

.excluir{
background:#ff4d4d;
margin-top:5px;
padding:5px;
color:white;
border:none;
cursor:pointer;
border-radius:4px;
}

@media(max-width:900px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

</style>

</head>

<body>

<header>
📡 RADAR DE OFERTAS
</header>

<div class="menu">
<a href="#">Eletrônicos</a>
<a href="#">Games</a>
<a href="#">Casa</a>
<a href="#">Beleza</a>
<a href="#">Suplementos</a>
</div>

<div class="container">

<div class="admin">

<h3>Adicionar Produto</h3>

<input id="nome" placeholder="Nome do produto">
<input id="preco" placeholder="Preço">
<input id="foto" placeholder="Link da imagem">
<input id="link" placeholder="Link Mercado Livre">

<button onclick="adicionar()">Adicionar Produto</button>

</div>

<div class="grid" id="grid"></div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || []

function salvar(){
localStorage.setItem("produtos", JSON.stringify(produtos))
}

function adicionar(){

let nome=document.getElementById("nome").value
let preco=document.getElementById("preco").value
let foto=document.getElementById("foto").value
let link=document.getElementById("link").value

produtos.push({nome,preco,foto,link})

salvar()

document.getElementById("nome").value=""
document.getElementById("preco").value=""
document.getElementById("foto").value=""
document.getElementById("link").value=""

mostrar()

}

function excluir(i){

produtos.splice(i,1)

salvar()

mostrar()

}

function mostrar(){

let grid=document.getElementById("grid")

grid.innerHTML=""

produtos.forEach(function(p,i){

let card=document.createElement("div")

card.className="card"

card.innerHTML=

'<img src="'+p.foto+'">'+
'<div class="nome">'+p.nome+'</div>'+
'<div class="preco">'+p.preco+'</div>'+
'<a class="botao" href="'+p.link+'" target="_blank">Comprar</a>'+
'<button class="excluir" onclick="excluir('+i+')">Excluir</button>'

grid.appendChild(card)

})

}

mostrar()

</script>

</body>
</html>
