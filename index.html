<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radar de Ofertas</title>

<style>

body{
font-family:Arial;
margin:0;
background:#ebebeb;
}

header{
background:#ffe600;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.menu{
background:white;
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

.menu a{
margin:0 10px;
text-decoration:none;
color:#333;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.admin{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

textarea,input{
width:100%;
padding:8px;
margin:5px 0;
border:1px solid #ccc;
border-radius:4px;
}

textarea{
min-height:100px;
}

button{
background:#3483fa;
color:white;
border:none;
padding:10px;
border-radius:4px;
cursor:pointer;
width:100%;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.card{
background:white;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.nome{
font-size:14px;
margin:8px 0;
height:40px;
overflow:hidden;
}

.preco{
font-size:24px;
font-weight:bold;
color:#333;
margin-bottom:6px;
}

.info{
font-size:14px;
color:#00a650;
line-height:1.5;
}

.botao{
display:block;
background:#3483fa;
color:white;
padding:8px;
border-radius:4px;
text-decoration:none;
margin-top:10px;
text-align:center;
}

.excluir{
background:#ff4d4d;
margin-top:5px;
padding:6px;
color:white;
border:none;
border-radius:4px;
width:100%;
cursor:pointer;
}

@media(max-width:900px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

</style>

</head>

<body>

<header>
📡 RADAR DE OFERTAS
</header>

<div class="menu">
<a href="#">Eletrônicos</a>
<a href="#">Games</a>
<a href="#">Casa</a>
<a href="#">Beleza</a>
<a href="#">Suplementos</a>
</div>

<div class="container">

<div class="admin">

<h3>Adicionar Produto</h3>

<input id="nome" placeholder="Nome do produto">

<input id="foto" placeholder="Link da imagem">

<textarea id="texto" placeholder="Cole o texto do Mercado Livre"></textarea>

<input id="link" placeholder="Link do produto">

<button onclick="adicionar()">Adicionar Produto</button>

</div>

<div class="grid" id="grid"></div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || []

function salvar(){
localStorage.setItem("produtos", JSON.stringify(produtos))
}

function limparTexto(t){

t = t.replace(/R\$\s+/g,"R$ ")
t = t.replace(/(\d)\s*,\s*(\d)/g,"$1,$2")
t = t.replace(/(\d)\s+(\d)/g,"$1$2")
t = t.replace(/\n+/g," ")
t = t.replace(/\s+/g," ")

return t

}

function extrairPreco(t){

let m = t.match(/R\$\s?[0-9\.]+,?[0-9]*/)

if(m){
return m[0]
}

return ""

}

function adicionar(){

let nome=document.getElementById("nome").value
let foto=document.getElementById("foto").value
let texto=document.getElementById("texto").value
let link=document.getElementById("link").value

texto = limparTexto(texto)

let preco = extrairPreco(texto)

produtos.push({nome,foto,texto,preco,link})

salvar()

document.getElementById("nome").value=""
document.getElementById("foto").value=""
document.getElementById("texto").value=""
document.getElementById("link").value=""

mostrar()

}

function excluir(i){

produtos.splice(i,1)

salvar()

mostrar()

}

function mostrar(){

let grid=document.getElementById("grid")

grid.innerHTML=""

produtos.forEach(function(p,i){

let card=document.createElement("div")

card.className="card"

card.innerHTML=

'<img src="'+p.foto+'">'+
'<div class="nome">'+p.nome+'</div>'+
'<div class="preco">'+p.preco+'</div>'+
'<div class="info">'+p.texto+'</div>'+
'<a class="botao" href="'+p.link+'" target="_blank">Comprar</a>'+
'<button class="excluir" onclick="excluir('+i+')">Excluir</button>'

grid.appendChild(card)

})

}

mostrar()

</script>

</body>
</html>
